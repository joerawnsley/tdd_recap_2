<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Devops Apprenticeship</title>
    </head>
    <body>
        <h1>Devops Apprenticeship Coins</h1>
        <ul>
            {% if coins%}
                {% for coin in coins%}
                    <li><a href="{{url_for(coin.id)}}" >{{coin.name}}</a></li>
                {% endfor %}
            {% else %}
                <p>There are no coins to display</p>
            {% endif %}
        </ul>
    </body>
</html>
