<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{coin.name}}</title>
    </head>
    <body>
        <h1>Coin: {{coin.name}}</h1>
        <h2>Duties</h2>
        <ul>
            {%for duty in duties%}
                <li><b>Duty {{duty.number}}:</b> {{duty.description}}</li>
            {% endfor %}
        </ul>
        <form method="POST">
            <p>Please enter a duty for this coin</p>
            <label for="number">Duty Number</label>
            <input name="number" id="number" type="text">
            <label for="description">Description</label>
            <input name="description" id="description" type="text">
            <button type="submit">Submit</button>
        </form>
        <a href="../">back</a>
    </body>
</html>
